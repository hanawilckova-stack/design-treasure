
<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Treasure</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-2: #f5f5f7;
      --bg-card: #ffffff;
      --text: #1D1D1F;
      --text-2: #6e6e73;
      --accent: #E8583D;
      --accent-h: #cf4a31;
      --border: #d2d2d7;
      --shadow: rgba(0,0,0,0.07);
      --shadow-h: rgba(0,0,0,0.14);
      --tab-on-bg: #1D1D1F;
      --tab-on-txt: #ffffff;
      --r: 14px;
    }
    [data-theme="dark"] {
      --bg: #1D1D1F;
      --bg-2: #2c2c2e;
      --bg-card: #2c2c2e;
      --text: #f5f5f7;
      --text-2: #86868b;
      --border: #3a3a3c;
      --shadow: rgba(0,0,0,0.25);
      --shadow-h: rgba(0,0,0,0.45);
      --tab-on-bg: #f5f5f7;
      --tab-on-txt: #1D1D1F;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .3s, color .3s;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .header-inner {
      max-width: 1440px; margin: 0 auto;
      padding: 0 28px; height: 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    .logo { font-size: 17px; font-weight: 700; letter-spacing: -.4px; white-space: nowrap; flex-shrink: 0; }
    .logo em { color: var(--accent); font-style: normal; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    /* Search */
    .search-wrap { position: relative; }
    .search-input {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 7px 14px 7px 34px;
      font-size: 13px; color: var(--text);
      width: 230px; outline: none;
      transition: width .25s, border-color .2s;
    }
    .search-input::placeholder { color: var(--text-2); }
    .search-input:focus { border-color: var(--accent); width: 290px; }
    .search-ico {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-2); pointer-events: none;
    }
    .search-drop {
      display: none; position: absolute;
      top: calc(100% + 8px); left: 0; right: 0; min-width: 280px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: 0 12px 36px var(--shadow-h);
      max-height: 320px; overflow-y: auto; z-index: 300;
    }
    .search-drop.open { display: block; }
    .search-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer; transition: background .15s;
    }
    .search-item:hover { background: var(--bg-2); }
    .search-item:first-child { border-radius: 12px 12px 0 0; }
    .search-item:last-child  { border-radius: 0 0 12px 12px; }
    .search-fav { width: 22px; height: 22px; border-radius: 5px; object-fit: cover; flex-shrink: 0; }
    .search-info { flex: 1; min-width: 0; }
    .search-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-cat { font-size: 11px; color: var(--text-2); margin-top: 1px; }
    .search-none { padding: 14px; font-size: 13px; color: var(--text-2); text-align: center; }

    /* Icon button (theme toggle) */
    .icon-btn {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 9px; padding: 7px 8px; cursor: pointer;
      color: var(--text); line-height: 0;
      transition: background .2s; display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: var(--border); }

    .login-btn {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 9px; padding: 6px 13px; cursor: pointer;
      color: var(--text); font-size: 13px; font-weight: 500;
      transition: background .2s;
    }
    .login-btn:hover { background: var(--border); }
    .login-btn.on { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    main { max-width: 1440px; margin: 0 auto; padding: 24px 28px 60px; }

    /* ── TABS ── */
    .tabs-row {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 24px; overflow-x: auto; padding-bottom: 2px;
      scrollbar-width: none;
    }
    .tabs-row::-webkit-scrollbar { display: none; }

    .tab {
      display: inline-flex; align-items: center;
      padding: 0 15px; height: 34px;
      border-radius: 9px; border: 1px solid var(--border);
      background: transparent; color: var(--text-2);
      font-size: 13px; font-weight: 500; cursor: pointer;
      white-space: nowrap; transition: all .2s; flex-shrink: 0;
    }
    .tab:hover { color: var(--text); border-color: var(--text-2); }
    .tab.active { background: var(--tab-on-bg); color: var(--tab-on-txt); border-color: var(--tab-on-bg); }

    .add-cat-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0 14px; height: 34px;
      border-radius: 9px; border: 1.5px dashed var(--border); background: transparent;
      color: var(--text-2); font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap; transition: all .2s; flex-shrink: 0;
    }
    .add-cat-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── CATEGORY HEADER ── */
    .cat-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px;
    }
    .cat-title { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
    .cat-edit-btn {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 9px; padding: 7px 8px; cursor: pointer;
      color: var(--text); line-height: 0;
      transition: background .2s; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cat-edit-btn:hover { background: var(--border); }
    .cat-spacer { flex: 1; }
    .add-link-btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      padding: 9px 18px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .2s;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .add-link-btn:hover { background: var(--accent-h); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); position: relative;
      transition: box-shadow .2s, transform .2s;
      display: flex; flex-direction: column;
      cursor: pointer;
    }
    .card:hover { box-shadow: 0 10px 36px var(--shadow-h); transform: translateY(-3px); }
    .card.dragging { opacity: .35; transform: scale(.97); }
    .card.drop-before { box-shadow: -4px 0 0 var(--accent), 0 10px 36px var(--shadow-h); }
    .card.drop-after  { box-shadow:  4px 0 0 var(--accent), 0 10px 36px var(--shadow-h); }

    /* Drag handle */
    .card-drag-handle {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      width: 28px; height: 28px; border-radius: 7px;
      background: rgba(0,0,0,.45); color: #fff;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s; cursor: grab;
    }
    .card:hover .card-drag-handle { opacity: 1; }
    .card-drag-handle:active { cursor: grabbing; }

    .card-thumb {
      width: 100%; height: 155px; object-fit: cover;
      background: var(--bg-2); display: block; flex-shrink: 0;
      border-radius: var(--r) var(--r) 0 0;
    }
    .card-thumb-favicon {
      width: 100%; height: 155px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--r) var(--r) 0 0;
    }
    .card-thumb-favicon img {
      width: 52px; height: 52px; border-radius: 12px;
      object-fit: cover; box-shadow: 0 4px 16px rgba(0,0,0,.15);
    }

    .card-body { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; }

    .card-title-row { display: flex; align-items: flex-start; gap: 4px; margin-bottom: 3px; }
    .card-title {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.35; flex: 1; min-width: 0;
    }
    .card-title-input {
      font-size: 14px; font-weight: 600;
      background: var(--bg-2); border: 1.5px solid var(--accent);
      border-radius: 7px; padding: 2px 7px; color: var(--text);
      width: 100%; outline: none; font-family: inherit;
    }
    .card-url {
      font-size: 11.5px; color: var(--text-2); text-decoration: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: block; transition: color .15s;
    }
    .card-url:hover { color: var(--accent); }

    /* Three-dot menu */
    .card-menu-wrap { position: relative; flex-shrink: 0; }
    .card-menu-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--text-2); width: 24px; height: 24px;
      border-radius: 6px; font-size: 15px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s; letter-spacing: .5px;
    }
    .card-menu-btn:hover { color: var(--text); background: var(--bg-2); }

    .card-menu-drop {
      display: none; position: absolute; top: calc(100% + 4px); right: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 8px 28px var(--shadow-h);
      min-width: 162px; z-index: 200; overflow: hidden;
    }
    .card-menu-drop.open { display: block; }
    .card-menu-item {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 13px; font-size: 13px; cursor: pointer;
      background: transparent; border: none; width: 100%;
      color: var(--text); text-align: left; font-family: inherit;
      transition: background .13s;
    }
    .card-menu-item:hover { background: var(--bg-2); }
    .card-menu-item.danger { color: #dc2626; }
    .card-menu-item.danger:hover { background: #fef2f2; }
    [data-theme="dark"] .card-menu-item.danger:hover { background: #3b1515; }
    .card-menu-item svg { flex-shrink: 0; }

    /* ── MODALS ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      backdrop-filter: blur(6px); z-index: 500;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .22s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px; width: min(90vw, 420px);
      box-shadow: 0 28px 72px rgba(0,0,0,.2);
      transform: scale(.95) translateY(10px); transition: transform .22s;
    }
    .overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }

    .m-input, .m-select {
      width: 100%; background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 13px; font-size: 14px;
      color: var(--text); outline: none; transition: border-color .2s;
      margin-bottom: 10px; font-family: inherit;
    }
    .m-input:focus, .m-select:focus { border-color: var(--accent); }
    .m-input::placeholder { color: var(--text-2); }
    .m-select { cursor: pointer; }
    .m-hint { font-size: 12px; color: var(--text-2); margin-top: -4px; margin-bottom: 10px; min-height: 16px; transition: color .2s; }
    .m-hint.ok   { color: #16a34a; }
    .m-hint.err  { color: #dc2626; }
    .m-hint.load { color: var(--accent); }
    .m-error { font-size: 12px; color: #dc2626; margin-top: -4px; margin-bottom: 10px; display: none; }
    .m-btns { display: flex; gap: 8px; margin-top: 6px; }
    .m-btn {
      flex: 1; padding: 10px; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
      transition: all .2s; font-family: inherit;
    }
    .m-btn.primary   { background: var(--accent); color: #fff; }
    .m-btn.primary:hover { background: var(--accent-h); }
    .m-btn.secondary { background: var(--bg-2); color: var(--text); border: 1px solid var(--border); }
    .m-btn.secondary:hover { background: var(--border); }

    /* Delete category section inside rename modal */
    .m-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0 14px; }
    .m-danger-label {
      font-size: 11px; font-weight: 600; letter-spacing: .6px;
      text-transform: uppercase; color: var(--text-2); margin-bottom: 8px;
    }
    .m-btn-danger {
      width: 100%; padding: 10px; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      background: transparent; border: 1.5px solid #dc2626;
      color: #dc2626; transition: all .2s; font-family: inherit;
    }
    .m-btn-danger:hover { background: #dc2626; color: #fff; }

    /* ── CONFIRM ── */
    .confirm-wrap {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      backdrop-filter: blur(6px); z-index: 600;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .confirm-wrap.open { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; padding: 24px; width: min(90vw, 360px);
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.2);
      transform: scale(.95); transition: transform .2s;
    }
    .confirm-wrap.open .confirm-box { transform: scale(1); }
    .confirm-icon { font-size: 36px; margin-bottom: 10px; }
    .confirm-msg  { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .confirm-sub  { font-size: 13px; color: var(--text-2); margin-bottom: 18px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 8px; }
    .confirm-btn  {
      flex: 1; padding: 10px; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
      font-family: inherit; transition: all .2s;
    }
    .confirm-btn.cancel { background: var(--bg-2); color: var(--text); border: 1px solid var(--border); }
    .confirm-btn.cancel:hover { background: var(--border); }
    .confirm-btn.danger { background: #dc2626; color: #fff; }
    .confirm-btn.danger:hover { background: #b91c1c; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text); color: var(--bg);
      padding: 9px 18px; border-radius: 100px;
      font-size: 13px; font-weight: 500; z-index: 1000;
      transition: transform .3s; white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .header-inner { padding: 0 14px; }
      main { padding: 16px 14px 48px; }
      .search-input { width: 150px; }
      .search-input:focus { width: 190px; }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- Confirm Dialog -->
<div class="confirm-wrap" id="confirmWrap">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirmIcon">🗑️</div>
    <div class="confirm-msg" id="confirmMsg">Smazat?</div>
    <div class="confirm-sub" id="confirmSub"></div>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" onclick="closeConfirm()">Zrušit</button>
      <button class="confirm-btn danger" id="confirmOkBtn" onclick="confirmOk()">Smazat</button>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="overlay" id="loginOverlay">
  <div class="modal">
    <div class="modal-title">Přihlásit se</div>
    <input type="password" class="m-input" id="pwdInput" placeholder="Heslo" autocomplete="current-password">
    <div class="m-error" id="loginErr">Nesprávné heslo, zkus to znovu.</div>
    <div class="m-btns">
      <button class="m-btn secondary" onclick="closeOv('loginOverlay')">Zrušit</button>
      <button class="m-btn primary" onclick="doLogin()">Přihlásit</button>
    </div>
  </div>
</div>

<!-- Add Link Modal -->
<div class="overlay" id="addLinkOverlay">
  <div class="modal">
    <div class="modal-title">Přidat odkaz</div>
    <input type="url" class="m-input" id="addUrl" placeholder="https://..." autocomplete="off">
    <div class="m-hint" id="addHint"></div>
    <input type="text" class="m-input" id="addTitle" placeholder="Název stránky" autocomplete="off">
    <div class="m-btns">
      <button class="m-btn secondary" onclick="closeOv('addLinkOverlay')">Zrušit</button>
      <button class="m-btn primary" onclick="doAddLink()">Přidat</button>
    </div>
  </div>
</div>

<!-- Category Modal (add / rename) -->
<div class="overlay" id="catOverlay">
  <div class="modal">
    <div class="modal-title" id="catModalTitle">Nová kategorie</div>
    <input type="text" class="m-input" id="catInput" placeholder="Název kategorie">
    <div class="m-btns">
      <button class="m-btn secondary" onclick="closeOv('catOverlay')">Zrušit</button>
      <button class="m-btn primary" onclick="doSaveCat()">Uložit</button>
    </div>
    <div id="catDeleteSection" style="display:none">
      <hr class="m-divider">
      <div class="m-danger-label">Nebezpečná zóna</div>
      <button class="m-btn-danger" onclick="openDeleteCat()">Smazat kategorii</button>
    </div>
  </div>
</div>

<!-- Move Link Modal -->
<div class="overlay" id="moveOverlay">
  <div class="modal">
    <div class="modal-title">Přesunout do kategorie</div>
    <select class="m-select" id="moveSelect"></select>
    <div class="m-btns">
      <button class="m-btn secondary" onclick="closeOv('moveOverlay')">Zrušit</button>
      <button class="m-btn primary" onclick="doMove()">Přesunout</button>
    </div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-inner">
    <div class="logo">Design <em>Treasure</em></div>
    <div class="header-right">
      <div class="search-wrap">
        <svg class="search-ico" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/>
        </svg>
        <input class="search-input" id="searchInput" placeholder="Hledat odkaz…" autocomplete="off" spellcheck="false">
        <div class="search-drop" id="searchDrop"></div>
      </div>
      <button class="icon-btn" id="themeBtn" title="Přepnout téma" aria-label="Přepnout téma"></button>
      <button class="login-btn" id="loginBtn">Přihlásit</button>
    </div>
  </div>
</header>

<!-- Main -->
<main>
  <div class="tabs-row" id="tabsRow"></div>
  <div id="catHeaderWrap"></div>
  <div class="grid" id="grid"></div>
</main>

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════

// ══════════════════════════════════════════
//  DEFAULT DATA
// ══════════════════════════════════════════
const DEFAULT = {

// ══════════════════════════════════════════
//  DRAG & DROP REORDER
// ══════════════════════════════════════════
function initDrag() {
  document.querySelectorAll('.card').forEach(card => {
    const id = card.id.slice(1);
    const handle = card.querySelector('.card-drag-handle');
    if (!handle) return;

    // Only the grip handle is draggable
    handle.setAttribute('draggable', 'true');

    handle.addEventListener('dragstart', e => {
      dragId = id;
      e.dataTransfer.effectAllowed = 'move';
      // Use whole card as ghost image
      const r = card.getBoundingClientRect();
      e.dataTransfer.setDragImage(card, e.clientX - r.left, e.clientY - r.top);
      requestAnimationFrame(() => card.classList.add('dragging'));
    });

    handle.addEventListener('dragend', () => {
      document.querySelectorAll('.card').forEach(c =>
        c.classList.remove('dragging', 'drop-before', 'drop-after'));
      dragId = null; dragOverId = null;
    });

    // Drop target is the whole card
    card.addEventListener('dragover', e => {
      e.preventDefault();
      if (id === dragId) return;
      const rect = card.getBoundingClientRect();
      dragBefore = e.clientX < rect.left + rect.width / 2;
      dragOverId = id;
      document.querySelectorAll('.card').forEach(c => c.classList.remove('drop-before','drop-after'));
      card.classList.add(dragBefore ? 'drop-before' : 'drop-after');
    });

    card.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragId || !dragOverId || dragId === dragOverId) return;
      const srcIdx = data.links.findIndex(l => l.id === dragId);
      const [moved] = data.links.splice(srcIdx, 1);
      let tgtIdx = data.links.findIndex(l => l.id === dragOverId);
      if (!dragBefore) tgtIdx++;
      data.links.splice(tgtIdx, 0, moved);
      save(); render();
    });
  });
}

function toggleMenu(id, e) {
  e.stopPropagation();
  const drop = document.getElementById('menu-' + id);
  const wasOpen = drop.classList.contains('open');
  closeMenu();
  if (!wasOpen) { drop.classList.add('open'); openMenuId = id; }
}
function closeMenu() {
  if (openMenuId) {
    const el = document.getElementById('menu-' + openMenuId);
    if (el) el.classList.remove('open');
    openMenuId = null;
  }
}

function doSaveCat() {
  const name = document.getElementById('catInput').value.trim();
  if (!name) return;
  if (editCatIdx !== null) {
    const old = data.categories[editCatIdx];
    data.categories[editCatIdx] = name;
    data.links.forEach(l => { if (l.cat === old) l.cat = name; });
    if (activeCat === old) activeCat = name;
    toast('Kategorie přejmenována');
  } else {
    if (data.categories.includes(name)) { toast('Tato kategorie už existuje'); return; }
    data.categories.push(name);
    activeCat = name;
    toast(`Kategorie „${name}" přidána`);
  }
  save(); closeOv('catOverlay'); render();
}

function openDeleteCat() {
  const cat = data.categories[editCatIdx];
  const cnt = data.links.filter(l => l.cat === cat).length;
  closeOv('catOverlay');
  document.getElementById('confirmIcon').textContent = '⚠️';
  document.getElementById('confirmMsg').textContent = `Smazat „${cat}"?`;
  document.getElementById('confirmSub').textContent = cnt > 0
    ? `Spolu s kategorií se smaže i všech ${cnt} odkazů. Tuto akci nelze vrátit zpět.`
    : 'Tuto akci nelze vrátit zpět.';
  document.getElementById('confirmOkBtn').textContent = 'Smazat kategorii';
  confirmCb = () => {
    data.links = data.links.filter(l => l.cat !== cat);
    data.categories.splice(editCatIdx, 1);
    activeCat = data.categories[0] || '';
    save(); render(); toast(`Kategorie „${cat}" smazána`);
  };
  document.getElementById('confirmWrap').classList.add('open');
}

document.getElementById('addUrl').addEventListener('input', () => {
  clearTimeout(fetchTimer);
  fetchTimer = setTimeout(fetchMeta, 900);
});

let fetchCtrl = null;
async function fetchMeta() {
  const url = document.getElementById('addUrl').value.trim();
  if (!url.startsWith('http')) return;
  const hint = document.getElementById('addHint');
  const titleInput = document.getElementById('addTitle');
  hint.textContent = 'Načítám informace o stránce…'; hint.className = 'm-hint load';
  if (fetchCtrl) fetchCtrl.abort();
  fetchCtrl = new AbortController();
  try {
    const res  = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: fetchCtrl.signal });
    const json = await res.json();
    const doc  = new DOMParser().parseFromString(json.contents, 'text/html');
    const title = doc.querySelector('meta[property="og:title"]')?.content ||
                  doc.querySelector('meta[name="twitter:title"]')?.content ||
                  doc.querySelector('title')?.textContent || '';
    const img   = doc.querySelector('meta[property="og:image"]')?.content ||
                  doc.querySelector('meta[name="twitter:image"]')?.content || '';
    pendingImg = img ? (() => { try { return new URL(img, url).href; } catch { return img; } })() : '';
    if (title && !titleInput.value) titleInput.value = title.trim();
    hint.textContent = title ? '✓ Informace načteny automaticky' : 'Název se nepodařilo načíst – zadej ručně';
    hint.className = title ? 'm-hint ok' : 'm-hint err';
  } catch(e) {
    if (e.name === 'AbortError') return;
    hint.textContent = 'Stránku nelze načíst – zadej název ručně';
    hint.className = 'm-hint err'; pendingImg = '';
  }
}

function doAddLink() {
  const url   = document.getElementById('addUrl').value.trim();
  const title = document.getElementById('addTitle').value.trim();
  if (!url || !title) { toast('Vyplň URL a název'); return; }
  data.links.push({ id: 'l' + Date.now(), cat: addingCat, url, title, img: pendingImg });
  save(); closeOv('addLinkOverlay'); render(); toast('Odkaz přidán ✓');
}

  if (!q) { searchDrop.classList.remove('open'); return; }
  const hits = data.links.filter(l =>
    l.title.toLowerCase().includes(q) || l.url.toLowerCase().includes(q) || l.cat.toLowerCase().includes(q)
  ).slice(0, 9);
  searchDrop.innerHTML = !hits.length
    ? `<div class="search-none">Nic nenalezeno</div>`
    : hits.map(l => {
        const fav = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(getDomain(l.url))}&sz=32`;
        return `<div class="search-item" onclick="jumpTo('${esc(l.cat)}','${esc(l.url)}')">
          <img class="search-fav" src="${fav}" alt="" onerror="this.style.display='none'">
          <div class="search-info">

  searchDrop.classList.add('open');
});

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function getDomain(url) { try { return new URL(url).hostname; } catch { return url; } }

function thumbBg(domain) {
  let h = 0;
  for (let i = 0; i < domain.length; i++) h = domain.charCodeAt(i) + ((h << 5) - h);
  const lights = ['#f0e9ff','#ffe4e1','#e8f4fd','#e4fce8','#fff8e1','#e0f7fa','#fce4ec','#f1f8e9'];
  const darks  = ['#2a1d4a','#4a1d1d','#1d3347','#1d4a28','#4a3d1d','#1d4a4a','#4a1d30','#2a4a1d'];
  const idx = Math.abs(h) % lights.length;
  return document.documentElement.getAttribute('data-theme') === 'dark' ? darks[idx] : lights[idx];
}
function escH(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(String(s))); return d.innerHTML; }
function escA(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
